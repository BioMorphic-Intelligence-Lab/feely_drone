name: feely_drone

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python==3.12.8
  - pytorch
  - "numpy<2.0"
  - tensorboard
  - matplotlib
  - stable-baselines3
  - pip
  - pip:
    - "setuptools>=65.0,<82"   # >=82 removes pkg_resources; tensorboard needs it
    - wheel
    - genesis-world==0.2.1
    - trimesh
    - ./feely_drone_common